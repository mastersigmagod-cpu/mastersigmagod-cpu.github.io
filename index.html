<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WR News Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--accent:#2563eb;
--text:#f8fafc;--muted:#94a3b8;--border:#475569;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;background:rgba(15,23,42,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);z-index:10}
.top{display:flex;align-items:center;gap:12px;padding:16px 20px}
.logo{font-weight:800;font-size:1.4rem}
.menu{font-size:1.5rem;background:none;border:none;color:white;cursor:pointer}
.search{padding:0 20px 16px}.search input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:white}
.categories{display:flex;gap:8px;padding:0 20px 16px;overflow:auto}
.categories button{background:var(--surface2);color:white;border:none;padding:10px 12px;border-radius:8px;cursor:pointer}
.hero{padding:30px 20px}
.heroCard{background:linear-gradient(135deg,#1e293b,#334155);padding:30px;border-radius:18px;animation:fade .5s}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:.25s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;height:180px;object-fit:cover}
.content{padding:16px}
.read{margin-top:12px;background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.sidebar{position:fixed;left:-280px;top:0;width:280px;height:100%;background:var(--surface);transition:.25s;padding:20px;z-index:20}
.sidebar.open{left:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:15}
.overlay.show{display:block}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
.modal.show{display:flex}
.modalbox{background:var(--surface);max-width:900px;width:100%;max-height:90vh;overflow:auto;padding:24px;border-radius:16px}
.close{margin-top:15px;padding:10px 14px}
@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
<h2>Configurações</h2><br>
<p>Portal WR News Pro</p>
</div>
<div class="overlay" id="overlay"></div>

<header>
<div class="top"><button class="menu" id="menu">☰</button><div class="logo">WR NEWS PRO</div></div>
<div class="search"><input id="search" placeholder="Pesquisar notícias..."></div>
<div class="categories">
<button data-cat="Todos">Todos</button>
<button data-cat="Tecnologia">Tecnologia</button>
<button data-cat="IA">IA</button>
<button data-cat="Mundo">Mundo</button>
<button data-cat="Esportes">Esportes</button>
</div>
</header>

<section class="hero">
<div class="heroCard">
<h1>Notícias com visual profissional</h1>
<p>Clique em qualquer notícia para abrir a leitura completa.</p>
</div>
</section>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
<div class="modalbox">
<h2 id="mt"></h2><br>
<p id="mc"></p>
<button class="close" id="close">Fechar</button>
</div>
</div>

<script>
const news=[
{c:"Tecnologia",t:"Nova geração de processadores",s:"Mais desempenho.",f:"Texto completo da notícia de tecnologia.",i:"https://picsum.photos/600/400?1"},
{c:"IA",t:"IA transforma empresas",s:"Automação cresce.",f:"Texto completo sobre inteligência artificial.",i:"https://picsum.photos/600/400?2"},
{c:"Mundo",t:"Evento internacional",s:"Cobertura global.",f:"Texto completo da notícia internacional.",i:"https://picsum.photos/600/400?3"},
{c:"Esportes",t:"Grande final",s:"Resultado da competição.",f:"Texto completo da notícia esportiva.",i:"https://picsum.photos/600/400?4"}
];
const grid=document.getElementById('grid');
function render(arr){
grid.innerHTML='';
arr.forEach(n=>{
const d=document.createElement('div');
d.className='card';
d.innerHTML=`<img src="${n.i}"><div class="content"><small>${n.c}</small><h3>${n.t}</h3><p>${n.s}</p><button class="read">Ler notícia</button></div>`;
d.querySelector('.read').onclick=()=>{
mt.textContent=n.t; mc.textContent=n.f;
modal.classList.add('show'); overlay.classList.add('show');
};
grid.appendChild(d);
});
}
render(news);
search.oninput=e=>render(news.filter(n=>(n.t+n.s).toLowerCase().includes(e.target.value.toLowerCase())));
document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{
const c=b.dataset.cat;
render(c==='Todos'?news:news.filter(n=>n.c===c));
});
menu.onclick=()=>{sidebar.classList.add('open');overlay.classList.add('show');}
overlay.onclick=()=>{sidebar.classList.remove('open');overlay.classList.remove('show');modal.classList.remove('show');}
close.onclick=()=>{modal.classList.remove('show');overlay.classList.remove('show');}
</script>
</body>
</html>
