<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WR News Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0b1220;--panel:#111827;--panel2:#1f2937;--border:#334155;
--text:#f3f4f6;--muted:#94a3b8;--accent:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;background:#0b1220ee;backdrop-filter:blur(10px);border-bottom:1px solid var(--border);z-index:100}
.topbar{display:flex;align-items:center;gap:12px;padding:16px 24px}
.logo{font-size:1.6rem;font-weight:800}
.menu{background:none;border:none;color:white;font-size:1.5rem;cursor:pointer}
.search{padding:0 24px 16px}
.search input{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--panel);color:white}
.categories{display:flex;gap:10px;overflow:auto;padding:0 24px 16px}
.categories button{background:var(--panel2);color:white;border:none;padding:10px 14px;border-radius:10px;cursor:pointer}
.layout{max-width:1400px;margin:auto;padding:24px}
.hero{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.main{background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid var(--border);border-radius:20px;padding:32px;min-height:320px;display:flex;flex-direction:column;justify-content:end}
.main h1{font-size:3rem}
.side{display:grid;gap:14px}
.mini{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px}
.section-title{margin:30px 0 20px;font-size:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:.25s}
.card:hover{transform:translateY(-6px)}
.card img{width:100%;height:220px;object-fit:cover}
.card-body{padding:18px}
.badge{display:inline-block;background:var(--accent);padding:6px 10px;border-radius:8px;font-size:.8rem}
.card h3{margin:12px 0}
.card p{color:var(--muted)}
.actions{display:flex;gap:10px;margin-top:14px}
.btn{background:var(--accent);border:none;color:white;padding:10px 14px;border-radius:10px;cursor:pointer}
.btn2{background:var(--panel2);border:none;color:white;padding:10px 14px;border-radius:10px;cursor:pointer}
.sidebar{position:fixed;left:-320px;top:0;width:320px;height:100%;background:var(--panel);border-right:1px solid var(--border);transition:.3s;padding:24px;z-index:300}
.sidebar.open{left:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:250}
.overlay.show{display:block}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;z-index:400}
.modal.show{display:flex}
.modal-box{width:100%;max-width:1000px;max-height:90vh;overflow:auto;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:28px}
.modal-box p{line-height:1.8;color:var(--muted)}
footer{text-align:center;padding:30px;color:var(--muted)}
@media(max-width:900px){.hero{grid-template-columns:1fr}.main h1{font-size:2rem}}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
<h2>Configurações</h2><br>
<p>Favoritos salvos: <span id="favCount">0</span></p><br>
<button class="btn2" onclick="localStorage.clear();location.reload()">Limpar favoritos</button>
</div>
<div class="overlay" id="overlay"></div>

<header>
<div class="topbar"><button class="menu" id="menu">☰</button><div class="logo">WR NEWS ULTRA</div></div>
<div class="search"><input id="search" placeholder="Pesquisar notícias"></div>
<div class="categories">
<button data-cat="Todos">Todos</button>
<button data-cat="Tecnologia">Tecnologia</button>
<button data-cat="IA">IA</button>
<button data-cat="Mundo">Mundo</button>
<button data-cat="Economia">Economia</button>
<button data-cat="Esportes">Esportes</button>
</div>
</header>

<div class="layout">
<section class="hero">
<div class="main"><h1>Portal de Notícias Moderno</h1><p>Leitura completa, favoritos e filtros.</p></div>
<div class="side">
<div class="mini">Mercados em destaque</div>
<div class="mini">Tecnologia e IA</div>
<div class="mini">Últimas atualizações</div>
</div>
</section>

<h2 class="section-title">Últimas Notícias</h2>
<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h1 id="title"></h1><br>
<p id="content"></p><br>
<button class="btn" id="close">Fechar</button>
</div>
</div>

<footer>© 2026 WR News Ultra</footer>

<script>
const lorem='Lorem ipsum dolor sit amet, consectetur adipiscing elit. '.repeat(50);
const news=[
{c:'Tecnologia',t:'Nova arquitetura de chips',s:'Empresas anunciam avanços.',i:'https://picsum.photos/800/500?1',f:lorem},
{c:'IA',t:'IA muda o mercado',s:'Automação acelera.',i:'https://picsum.photos/800/500?2',f:lorem},
{c:'Mundo',t:'Evento global importante',s:'Cobertura internacional.',i:'https://picsum.photos/800/500?3',f:lorem},
{c:'Economia',t:'Indicadores sobem',s:'Mercado reage.',i:'https://picsum.photos/800/500?4',f:lorem},
{c:'Esportes',t:'Grande final decide campeonato',s:'Partida histórica.',i:'https://picsum.photos/800/500?5',f:lorem},
{c:'Tecnologia',t:'Novo smartphone lançado',s:'Mais desempenho.',i:'https://picsum.photos/800/500?6',f:lorem}
];
const favs=JSON.parse(localStorage.getItem('favs')||'[]');
favCount.textContent=favs.length;

function render(arr){
grid.innerHTML='';
arr.forEach((n,id)=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<img src="${n.i}"><div class="card-body"><span class="badge">${n.c}</span><h3>${n.t}</h3><p>${n.s}</p><div class="actions"><button class="btn read">Ler</button><button class="btn2 fav">Favorito</button></div></div>`;
card.querySelector('.read').onclick=()=>{
title.textContent=n.t;
content.textContent=n.f;
modal.classList.add('show');
overlay.classList.add('show');
};
card.querySelector('.fav').onclick=()=>{
let f=JSON.parse(localStorage.getItem('favs')||'[]');
f.push(n.t);
localStorage.setItem('favs',JSON.stringify(f));
favCount.textContent=f.length;
};
grid.appendChild(card);
});
}
render(news);

search.oninput=e=>{
const q=e.target.value.toLowerCase();
render(news.filter(n=>(n.t+n.s+n.c).toLowerCase().includes(q)));
};

document.querySelectorAll('[data-cat]').forEach(b=>{
b.onclick=()=>{
const c=b.dataset.cat;
render(c==='Todos'?news:news.filter(n=>n.c===c));
};
});

menu.onclick=()=>{sidebar.classList.add('open');overlay.classList.add('show');};
overlay.onclick=()=>{
sidebar.classList.remove('open');
overlay.classList.remove('show');
modal.classList.remove('show');
};
close.onclick=()=>{
modal.classList.remove('show');
overlay.classList.remove('show');
};
</script>
</body>
</html>
